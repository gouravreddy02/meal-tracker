<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meal Log</title>
  <meta name="theme-color" content="#1a1626" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meal Log" />
  <style>
    :root {
      --ink:#1a1626; --panel:#241d35; --lime:#c5f04a; --mute:#8a82a0;
      --line:#352c4a; --blue:#6ad2ff; --orange:#ff9d6a; --red:#ff5d6c;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; padding:0; background:var(--ink); }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color:#fff; padding: max(20px, env(safe-area-inset-top)) 14px 60px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 460px; margin: 0 auto; }

    .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; }
    .eyebrow { font-size:11px; letter-spacing:3px; color:var(--lime); font-weight:700; text-transform:uppercase; }
    .eyebrow.lime { color:var(--lime); }
    h1 { font-size:30px; margin:4px 0 0; font-weight:800; letter-spacing:-1px; }
    .sub { font-size:13px; color:var(--mute); margin-top:2px; }
    .badge { font-size:11px; font-weight:700; padding:5px 9px; border-radius:8px; margin-top:4px; min-width:54px; text-align:center; }
    .badge.ok { background:#27331a; color:var(--lime); border:1px solid var(--line); }
    .badge.err { background:#3a1f2a; color:#ff8d8d; border:1px solid #5a2a3a; }

    /* profile */
    .profBtn { width:42px; height:42px; flex:0 0 auto; border-radius:50%; cursor:pointer;
      background:var(--panel); color:var(--lime); border:1px solid var(--line);
      font-size:17px; font-weight:800; display:flex; align-items:center; justify-content:center; }
    .profBtn:active { background:#1c2417; }
    .iconBtn { width:42px; height:42px; flex:0 0 auto; border-radius:50%; cursor:pointer;
      background:var(--panel); color:var(--mute); border:1px solid var(--line);
      font-size:24px; line-height:1; font-weight:700; display:flex; align-items:center;
      justify-content:center; padding:0 3px 3px 0; }
    .iconBtn:active { background:#1c2417; color:var(--lime); }
    .profEmail { font-size:18px; font-weight:800; margin-top:4px; word-break:break-all; }
    .statGrid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:14px; }
    .statTile { background:#11160d; border:1px solid var(--line); border-radius:13px; padding:13px 14px; }
    .statVal { font-size:23px; font-weight:800; letter-spacing:-0.5px; }
    .statUnit { font-size:13px; color:var(--mute); font-weight:600; }
    .statLab { font-size:11px; color:var(--mute); margin-top:3px; letter-spacing:1px; text-transform:uppercase; }
    .trendRow { display:flex; justify-content:space-between; align-items:baseline;
      padding:9px 0; border-top:1px solid var(--line); }
    .trendVal { font-size:16px; font-weight:800; }
    .wchartBox { background:#11160d; border:1px solid var(--line); border-radius:13px; padding:10px 8px; }
    .wchart { display:block; width:100%; height:auto; overflow:visible; }
    .wcaxis { fill:var(--mute); font-size:9px; font-weight:600; }
    .collapseHdr { display:flex; align-items:center; justify-content:space-between; width:100%;
      background:none; border:none; padding:6px 0; cursor:pointer; }
    .collapseChev { color:var(--mute); font-size:13px; line-height:1; }
    .collapseHdr:active .collapseChev { color:var(--lime); }

    .strip { display:flex; gap:7px; overflow-x:auto; padding-bottom:8px; margin-bottom:16px; }
    .strip::-webkit-scrollbar { height:0; }
    .day { flex:0 0 auto; min-width:52px; padding:8px 6px; border-radius:12px; cursor:pointer;
      background:var(--panel); color:#fff; border:1px solid var(--line); text-align:center; }
    .day.active { background:var(--lime); color:var(--ink); border-color:var(--lime); }
    .dow { font-size:10px; opacity:.7; font-weight:600; }
    .dnum { font-size:17px; font-weight:800; line-height:1.2; }
    .dot { height:5px; width:5px; border-radius:5px; margin:3px auto 0; background:transparent; }
    .dot.on { background:var(--lime); }
    .day.active .dot.on { background:var(--ink); }

    .backbtn { background:none; border:none; padding:0; font-size:11px; letter-spacing:2px;
      color:var(--lime); font-weight:700; text-transform:uppercase; cursor:pointer; }
    .backbtn:active { opacity:.6; }

    /* week navigation within a cycle */
    .wknav { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:12px; }
    .wklabel { font-size:12px; font-weight:700; color:var(--mute); letter-spacing:1px; }
    .wkarrow { background:var(--panel); border:1px solid var(--line); color:#fff; cursor:pointer;
      width:34px; height:34px; border-radius:10px; font-size:18px; line-height:1; }
    .wkarrow:disabled { opacity:.3; cursor:default; }
    .wkarrow:active:not(:disabled) { background:var(--lime); color:var(--ink); }

    /* weeks list view */
    /* phase accent colour, set per row/tag via the .ph-* classes */
    .ph-bulk   { --phase:var(--lime); }
    .ph-recomp { --phase:var(--blue); }
    .ph-cut    { --phase:var(--orange); }

    .weekItem { margin-bottom:10px; }
    .swipeWrap { position:relative; border-radius:14px; overflow:hidden; }
    .swipeAct { position:absolute; top:0; right:0; bottom:0; display:flex; }
    .swipeBtn { width:84px; border:none; cursor:pointer; color:#fff;
      font-size:14px; font-weight:800; letter-spacing:.5px;
      display:flex; align-items:center; justify-content:center; }
    .swipeEdit { background:#2e7d5b; }
    .swipeEdit:active { background:#256249; }
    .swipeDel { background:#c0392b; }
    .swipeDel:active { background:#a93226; }
    .weekRow2 { position:relative; touch-action:pan-y; will-change:transform;
      display:flex; align-items:stretch; justify-content:space-between; gap:10px;
      background:var(--panel); border:1px solid var(--line); border-left:4px solid var(--phase, var(--line));
      border-radius:14px; overflow:hidden; }
    .weekRow2.current { border-color:var(--phase, var(--lime)); border-left-width:4px; }
    .weekMeta { flex:1; min-width:0; padding:14px 14px; cursor:pointer; }
    .weekMeta:active { background:var(--ink); }
    .weekTitle { font-size:16px; font-weight:800; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .phaseTag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
      color:var(--phase, var(--lime)); border:1px solid var(--phase, var(--line));
      padding:2px 7px; border-radius:6px; }
    .curTag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
      color:var(--ink); background:var(--lime); padding:2px 7px; border-radius:6px; }
    .weekRight { display:flex; align-items:center; gap:6px; padding:0 10px 0 0; }
    .weekAvg { font-size:18px; font-weight:800; white-space:nowrap; }
    .weekAvg.muted { color:var(--mute); font-weight:700; }
    .chevBtn { background:none; border:none; color:var(--mute); font-size:15px; cursor:pointer;
      padding:8px 6px; line-height:1; }
    .chevBtn:active { color:var(--lime); }

    /* inline week editor */
    .weekEditor { background:var(--panel); border:1px solid var(--line); border-top:none;
      border-radius:0 0 14px 14px; margin-top:-4px; padding:14px; }
    .edLabel { font-size:11px; letter-spacing:2px; color:var(--mute); font-weight:700;
      text-transform:uppercase; margin:4px 0 8px; }
    .edLabel:not(:first-child) { margin-top:14px; }
    .phasePills { display:flex; gap:8px; }
    .phasePill { flex:1; padding:9px 6px; border-radius:11px; cursor:pointer; font-size:12px; font-weight:700;
      background:var(--ink); color:var(--phase, #fff); border:1px solid var(--line); }
    .phasePill.on { background:var(--phase, var(--lime)); color:var(--ink); border-color:var(--phase, var(--lime)); }

    .card { background:var(--panel); border-radius:18px; padding:18px; border:1px solid var(--line); margin-bottom:16px; }
    .totalsTop { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
    .bigcal { font-size:38px; font-weight:800; line-height:1; letter-spacing:-1.5px; }
    .weightBox { text-align:right; }
    .wlabel { font-size:11px; color:var(--mute); text-transform:uppercase; letter-spacing:1px; }
    .winput { width:72px; margin-top:3px; background:var(--ink); border:1px solid var(--line); color:var(--lime);
      font-size:18px; font-weight:700; border-radius:10px; padding:6px 8px; text-align:right; outline:none; }
    .wunit { font-size:12px; color:var(--mute); margin-left:4px; background:none; border:none;
      cursor:pointer; padding:2px 4px; border-radius:6px; text-decoration:underline dotted;
      text-underline-offset:2px; font:inherit; }
    .wunit:active { color:var(--lime); }

    .mb { margin-bottom:10px; }
    .mbtop { display:flex; justify-content:space-between; font-size:12px; color:var(--mute); margin-bottom:4px; }
    .mblabel { letter-spacing:.5px; text-transform:uppercase; font-weight:600; }
    .mbval { color:#fff; font-variant-numeric:tabular-nums; }
    .muted { color:var(--mute); }
    .track { height:7px; background:var(--line); border-radius:6px; overflow:hidden; }
    .fill { height:100%; border-radius:6px; transition:width .3s; }

    .list { margin-bottom:16px; }
    .empty { color:var(--mute); font-size:14px; text-align:center; padding:18px 0; }
    .item { display:flex; align-items:center; justify-content:space-between; padding:11px 14px;
      background:var(--panel); border-radius:12px; margin-bottom:7px; border:1px solid var(--line); }
    .itemInfo { flex:1; min-width:0; }
    .iname { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .imacros { font-size:11.5px; color:var(--mute); margin-top:1px; }
    .x { margin-left:10px; background:none; border:none; color:var(--mute); font-size:22px; cursor:pointer; line-height:1; }

    /* grouped log + drag-and-drop */
    .logSection { margin-bottom:6px; }
    .logSection .slotTitle { margin:14px 0 8px; }
    .logSection:first-child .slotTitle { margin-top:2px; }
    .sectionBody { display:flex; flex-direction:column; gap:7px; min-height:4px; }
    .sectionBody .item { margin-bottom:0; }
    .item.draggable { touch-action:none; user-select:none; -webkit-user-select:none;
      -webkit-touch-callout:none; cursor:grab; }
    .grip { flex:0 0 auto; margin-right:10px; color:var(--mute); font-size:15px; line-height:1; }
    .placeholder { border:1px dashed var(--lime); border-radius:12px; background:rgba(197,240,74,.07); }
    .dropHint { color:var(--mute); font-size:12px; text-align:center; padding:12px 0;
      border:1px dashed var(--line); border-radius:12px; }
    .dragClone { position:fixed; z-index:1000; margin:0; pointer-events:none; opacity:.96;
      transform:scale(1.03); box-shadow:0 12px 28px rgba(0,0,0,.5); border-color:var(--lime); }

    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tab { flex:1; padding:9px 6px; border-radius:11px; cursor:pointer; font-size:12px; font-weight:700;
      white-space:nowrap; background:var(--panel); color:#fff; border:1px solid var(--line); }
    .tab.active { background:var(--lime); color:var(--ink); border-color:var(--lime); }

    .slotTitle { font-size:11px; letter-spacing:2px; color:var(--mute); font-weight:700;
      text-transform:uppercase; margin:16px 0 8px; }
    .slotTitle:first-of-type { margin-top:4px; }
    .presets { display:flex; flex-direction:column; gap:7px; min-height:4px; }
    .presets .dropHint { width:100%; }
    .preset { display:flex; align-items:stretch; width:100%; background:var(--panel); border:1px solid var(--line);
      color:#fff; border-radius:11px; font-size:12.5px; cursor:pointer; text-align:left; overflow:hidden; }
    .preset.draggable { touch-action:none; user-select:none; -webkit-user-select:none;
      -webkit-touch-callout:none; }
    .preset.logged { background:var(--lime); border-color:var(--lime); color:var(--ink); }
    .qty { display:flex; align-items:center; justify-content:center; min-width:34px; padding:0 8px;
      background:var(--red); color:#fff; font-weight:700; border-right:1px solid var(--line); cursor:text; }
    .qinput { width:44px; padding:0 4px; border:none; outline:none; background:var(--red); color:#fff;
      font-weight:700; font-size:12.5px; text-align:center; -moz-appearance:textfield; }
    .pbody { flex:1; min-width:0; padding:9px 12px; display:flex; flex-direction:column; gap:3px; }
    .pn { font-weight:600; font-size:13.5px; }
    .pmacros { display:flex; flex-wrap:wrap; align-items:center; gap:4px 10px; font-size:11px; color:var(--mute); }
    .pcal { font-weight:700; color:#fff; }
    .preset.logged .pmacros { color:rgba(26,22,38,.7); }
    .preset.logged .pcal { color:var(--ink); }
    .pc { color:var(--mute); margin-left:6px; }
    .preset.logged .pc { color:rgba(26,22,38,.6); }
    .pdel { align-self:stretch; padding:0 9px; border:none; border-left:1px solid var(--line);
      background:transparent; color:var(--mute); font-size:15px; line-height:1; cursor:pointer; }
    .preset.logged .pdel { color:rgba(26,22,38,.55); }
    .preset.removing { cursor:default; }
    .preset.removing .pdel { color:var(--red); font-weight:700; }

    .customBox { background:var(--panel); border-radius:14px; padding:14px; border:1px solid var(--line); }
    .ci { width:100%; background:var(--ink); border:1px solid var(--line); color:#fff;
      border-radius:10px; padding:10px 12px; font-size:14px; outline:none; margin-bottom:8px; }
    .crow { display:flex; gap:8px; }
    .crow .ci { margin-bottom:8px; }
    .addBtn { margin-top:2px; width:100%; background:var(--lime); color:var(--ink); border:none;
      border-radius:11px; padding:11px; font-size:14px; font-weight:700; cursor:pointer; }

    .trend { margin-top:22px; }
    .wcols { display:flex; gap:12px; margin-top:10px; }
    .wcol { flex:1; text-align:center; padding:10px 0; background:var(--ink); border-radius:11px; }
    .wctitle { font-size:11px; color:var(--mute); }
    .wcval { font-size:22px; font-weight:800; }
    .wcval.muted { color:var(--mute); }
    .wcu { font-size:12px; color:var(--mute); font-weight:400; }
    .diff { margin-top:12px; font-size:13px; text-align:center; color:var(--mute); }
    .lime { color:var(--lime); } .b { font-weight:700; }
    .note { margin-top:10px; font-size:11.5px; color:var(--mute); line-height:1.5; text-align:center; }

    .login { min-height:78vh; display:flex; flex-direction:column; justify-content:center; }
    .loginCard { background:var(--panel); border:1px solid var(--line); border-radius:18px;
      padding:30px 22px; text-align:center; }
    .loginCard h1 { margin:6px 0 0; }
    .loginCard .sub { margin:8px auto 0; max-width:300px; }
    .linklike { display:block; margin:16px auto 0; background:none; border:none; color:var(--mute);
      font:inherit; font-size:12px; text-decoration:underline dotted; text-underline-offset:2px; cursor:pointer; }
    .linklike:active { color:var(--lime); }

    .tools { display:flex; gap:8px; margin-top:16px; }
    .tool { flex:1; padding:10px; border-radius:11px; background:transparent; color:var(--mute);
      border:1px solid var(--line); font-size:12px; font-weight:600; cursor:pointer; }
    .tool:active { background:var(--panel); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="plan.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>

  <!--
    Firebase Auth (Google sign-in) loaded from the gstatic CDN. Exposes a tiny
    window.FBAuth that store.js uses to authorize Realtime Database REST calls.
    Skipped while PLAN.sync still holds placeholder values.
  -->
  <script type="module">
    const cfg = window.PLAN && window.PLAN.sync;
    if (cfg && cfg.apiKey && !/PASTE/.test(cfg.apiKey)) {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } =
        await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      const app = initializeApp({
        apiKey: cfg.apiKey, authDomain: cfg.authDomain,
        databaseURL: cfg.databaseURL, projectId: cfg.projectId,
      });
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      let current = null;
      window.FBAuth = {
        signInWithGoogle: () => signInWithPopup(auth, provider),
        signOut: () => signOut(auth),
        getUser: () => current ? { email: current.email, uid: current.uid } : null,
        getToken: () => current ? current.getIdToken() : Promise.resolve(null),
        onChange: (cb) => onAuthStateChanged(auth, (u) => { current = u; cb(window.FBAuth.getUser()); }),
      };
      window.dispatchEvent(new Event("fbauth-ready"));
    }
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
